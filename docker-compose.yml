services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: spareparts
      POSTGRES_USER: spareparts
      POSTGRES_PASSWORD: spareparts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb --ignore-existing local/spareparts;
      mc anonymous set download local/spareparts/public;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
