services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: spareparts
      POSTGRES_USER: spareparts
      POSTGRES_PASSWORD: spareparts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
        echo 'MinIO not ready, retrying in 2 seconds...';
        sleep 2;
      done;
      echo 'MinIO is ready. Creating bucket...';
      mc mb --ignore-existing myminio/spareparts;
      echo 'Setting public download policy for parts/images only...';
      mc anonymous set download myminio/spareparts/parts/images;
      echo 'MinIO initialization complete!';
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
