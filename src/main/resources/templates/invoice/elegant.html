<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page {
            size: A4;
            margin: 36pt;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            font-size: 9pt;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .top-border {
            width: 100%;
            border-bottom: 2px solid #b4b4b4;
            height: 5px;
            margin-bottom: 10px;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .logo {
            max-width: 120px;
            max-height: 60px;
            margin-bottom: 10px;
        }
        .company-name {
            font-size: 22pt;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .company-details {
            font-size: 9pt;
            color: #555;
            margin-bottom: 15px;
        }
        .invoice-type-label {
            font-size: 20pt;
            font-weight: bold;
            text-align: center;
            margin-bottom: 3px;
        }
        .separator {
            width: 100%;
            border: none;
            height: 1.5px;
            margin-bottom: 10px;
        }
        .details-table {
            width: 100%;
            margin-bottom: 20px;
            border-collapse: collapse;
        }
        .details-table td {
            vertical-align: top;
            padding: 12px;
            border: 1px solid #c8c8c8;
            width: 50%;
        }
        .section-title {
            font-size: 11pt;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .customer-name {
            font-size: 10pt;
            font-weight: bold;
        }
        .label {
            font-weight: bold;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .items-table th {
            background-color: #f0f0f5;
            font-size: 10pt;
            font-weight: bold;
            padding: 8px;
            text-align: center;
            border: 1px solid #c8c8c8;
        }
        .items-table td {
            padding: 6px;
            font-size: 9pt;
            border: 1px solid #dcdcdc;
        }
        .text-right {
            text-align: right;
        }
        .text-center {
            text-align: center;
        }
        .text-left {
            text-align: left;
        }
        .totals-wrapper {
            width: 100%;
        }
        .totals-table {
            width: 45%;
            margin-left: auto;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .totals-table td {
            padding: 6px;
            font-size: 9pt;
        }
        .total-row td {
            border-top: 2px solid #4F46E5;
            font-size: 12pt;
            font-weight: bold;
        }
        .amount-words {
            text-align: right;
            font-size: 9pt;
            font-style: italic;
            color: #505050;
            margin-top: 8px;
            margin-bottom: 15px;
        }
        .notes-section {
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .notes-title {
            font-size: 10pt;
            font-weight: bold;
        }
        .stamp {
            max-width: 100px;
            max-height: 100px;
        }
        .stamp-container {
            text-align: right;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .footer-separator {
            width: 100%;
            border: none;
            height: 1px;
            background-color: #c8c8c8;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .footer-notes {
            text-align: center;
            font-size: 8pt;
            font-style: italic;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- DECORATIVE TOP BORDER -->
    <div class="top-border"></div>

    <!-- CENTERED HEADER -->
    <div class="header">
        <img th:if="${logoBase64}" th:src="'data:image/png;base64,' + ${logoBase64}" class="logo" alt="Logo"/><br th:if="${logoBase64}"/>
        <div class="company-name" th:style="'color:' + ${template.primaryColor}"
             th:text="${companySettings.companyName} ?: 'Company Name'">Company</div>
        <div class="company-details">
            <span th:if="${companySettings.street}" th:text="${companySettings.street} + ' &bull; '"></span>
            <span th:if="${companySettings.city}" th:text="${companySettings.city} + ' &bull; '"></span>
            <span th:if="${companySettings.phone}" th:text="${companySettings.phone}"></span>
        </div>
    </div>

    <!-- INVOICE TYPE -->
    <div th:if="${invoice.invoiceType.name() != 'STANDARD'}">
        <div class="invoice-type-label" th:style="'color:' + ${template.accentColor}" th:text="${invoiceTypeLabel}"></div>
        <hr class="separator" th:style="'background-color:' + ${template.accentColor}"/>
    </div>

    <br/><br/>

    <!-- DETAILS: Customer | Invoice Info -->
    <table class="details-table">
        <tr>
            <td>
                <div class="section-title" th:style="'color:' + ${template.accentColor}">Facture a</div>
                <br/>
                <div class="customer-name" th:text="${invoice.customer.name}"></div>
                <div th:if="${invoice.customer.company}" th:text="${invoice.customer.company}"></div>
                <div th:if="${invoice.customer.street}" th:text="${invoice.customer.street}"></div>
                <div th:if="${invoice.customer.postalCode != null or invoice.customer.city != null}">
                    <span th:if="${invoice.customer.postalCode}" th:text="${invoice.customer.postalCode} + ' '"></span>
                    <span th:if="${invoice.customer.city}" th:text="${invoice.customer.city}"></span>
                </div>
                <div th:if="${invoice.customer.country}" th:text="${invoice.customer.country}"></div>
                <div th:if="${template.showCustomerTaxId and invoice.customer.taxId != null}" th:text="'TVA: ' + ${invoice.customer.taxId}"></div>
            </td>
            <td>
                <div class="section-title" th:style="'color:' + ${template.accentColor}">Details de la facture</div>
                <br/>
                <span class="label">Numero: </span><span th:text="${invoice.invoiceNumber}"></span><br/>
                <span class="label">Date: </span><span th:text="${issuedDate}"></span><br/>
                <span th:if="${invoice.dueDate != null and template.showPaymentTerms}">
                    <span class="label">Echeance: </span><span th:text="${dueDate}"></span><br/>
                </span>
                <span th:if="${invoice.invoiceType.name() != 'PROFORMA'}"><span class="label">Statut: </span><span th:text="${statusLabel}"></span></span>
            </td>
        </tr>
    </table>

    <!-- ITEMS TABLE -->
    <table class="items-table">
        <thead>
            <tr>
                <th th:style="'color:' + ${template.primaryColor}" class="text-left">Description</th>
                <th th:style="'color:' + ${template.primaryColor}">Quantite</th>
                <th th:style="'color:' + ${template.primaryColor}">Prix unitaire</th>
                <th th:if="${template.showDiscountColumn}" th:style="'color:' + ${template.primaryColor}">Remise</th>
                <th th:style="'color:' + ${template.primaryColor}">Montant</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item, stat : ${invoice.items}">
                <td class="text-left" th:text="${item.part.name}"></td>
                <td class="text-center" th:text="${item.quantity}"></td>
                <td class="text-right" th:text="${itemUnitPrices[stat.index]}"></td>
                <td th:if="${template.showDiscountColumn}" class="text-center"
                    th:text="${item.discountPercent.compareTo(T(java.math.BigDecimal).ZERO) > 0} ? ${item.discountPercent} + '%' : '-'"></td>
                <td class="text-right" th:text="${itemTotalPrices[stat.index]}"></td>
            </tr>
        </tbody>
    </table>

    <!-- TOTALS -->
    <div class="totals-wrapper">
        <table class="totals-table">
            <tr>
                <td class="text-right">Sous-total</td>
                <td class="text-right label" th:text="${formattedSubtotal}"></td>
            </tr>
            <tr th:if="${invoice.discountAmount.compareTo(T(java.math.BigDecimal).ZERO) > 0}">
                <td class="text-right">Remise</td>
                <td class="text-right label" th:text="'- ' + ${formattedDiscount}"></td>
            </tr>
            <tr>
                <td class="text-right">TVA</td>
                <td class="text-right label" th:text="${formattedTax}"></td>
            </tr>
            <tr th:if="${invoice.depositDeduction.compareTo(T(java.math.BigDecimal).ZERO) > 0}">
                <td class="text-right">Acompte deduit</td>
                <td class="text-right label" th:text="'- ' + ${formattedDeposit}"></td>
            </tr>
            <tr class="total-row">
                <td class="text-right" th:style="'color:' + ${template.accentColor}">MONTANT TOTAL</td>
                <td class="text-right" th:style="'color:' + ${template.accentColor}" th:text="${formattedTotal}"></td>
            </tr>
        </table>
    </div>

    <div class="amount-words">
        Arrete a: <span th:text="${amountInWords}"></span>
    </div>

    <!-- NOTES -->
    <div th:if="${invoice.notes != null and !invoice.notes.isEmpty()}" class="notes-section">
        <div class="notes-title">Notes:</div>
        <div th:text="${invoice.notes}"></div>
    </div>

    <!-- STAMP -->
    <div th:if="${stampBase64}" class="stamp-container">
        <img th:src="'data:image/png;base64,' + ${stampBase64}" class="stamp" alt="Stamp"/>
    </div>

    <!-- FOOTER -->
    <div th:if="${template.defaultNotes != null and !template.defaultNotes.isEmpty()}">
        <div class="footer-separator"></div>
        <div class="footer-notes" th:text="${template.defaultNotes}"></div>
    </div>
</body>
</html>
