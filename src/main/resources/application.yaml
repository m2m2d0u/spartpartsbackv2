spring:
  application:
    name: spareparts

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spareparts}
    username: ${DB_USERNAME:spareparts}
    password: ${DB_PASSWORD:spareparts}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  cors:
    allowed-origins:
      - http://localhost:3000
  security:
    jwt:
      secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
      access-token-expiration: 3600000
      refresh-token-expiration: 604800000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:3H91JFFYQIQX3FH83R5E}
    secret-key: ${MINIO_SECRET_KEY:PGTPd1i96QY6B+598VintgJu05jGHXDdulN41DdN}
    bucket: ${MINIO_BUCKET:spareparts}
    public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
