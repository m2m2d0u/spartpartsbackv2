spring:
  application:
    name: spareparts
  devtools:
    restart:
      enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spareparts}
    username: ${DB_USERNAME:spareparts}
    password: ${DB_PASSWORD:spareparts}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  password-reset:
    token-expiration: ${PASSWORD_RESET_TOKEN_EXPIRATION:1800000}
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:3000/reset-password}
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://spare.symmetry.sn
  security:
    jwt:
      secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
      access-token-expiration: 3600000
      refresh-token-expiration: 604800000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:spareparts}
    public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
