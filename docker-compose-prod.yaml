services:
  postgres:
    image: postgres:17-alpine
    container_name: spareparts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-spareparts}
      POSTGRES_USER: ${DB_USERNAME:-spareparts}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-spareparts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USERNAME:-spareparts} -d $${DB_NAME:-spareparts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spareparts-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: spareparts-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadminpassword123}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9001:9001"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: reg.m2m2d0u.store/spareparts/spareparts-back:latest
    container_name: spareparts-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-spareparts}
      DB_USERNAME: ${DB_USERNAME:-spareparts}
      DB_PASSWORD: ${DB_PASSWORD:-spareparts}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadminpassword123}
      MINIO_BUCKET: ${MINIO_BUCKET:-spareparts}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://storage-spare.symmetry.sn}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-diallom.abass@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-lspb gejr avdn vadq}
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
      PASSWORD_RESET_TOKEN_EXPIRATION: ${PASSWORD_RESET_TOKEN_EXPIRATION:-1800000}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:-https://spare.symmetry.sn/reset-password}
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: reg.m2m2d0u.store/spareparts/spareparts-front:latest
    container_name: spareparts-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - proxy

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
